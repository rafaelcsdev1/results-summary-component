<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Results summary component</title>

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/globals.css">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/responsive.css">

</head>

<body>
  <div class="flex-container">
    <div class="result-box">
      <h4>Your Result</h4>
      <div class="circle">
        <h1>76</h1>
        <p>of 100</p>
      </div>
      <h3>Great</h3>
      You scored higher than 65% of the people who have taken these tests.
    </div>

    <div class="summary-box">
      <ul class="summary-classification">
        <li>
          <h5 class="summary-topic">Reaction</h5>
          <p class="summary-rate">80 / 100</p>
        </li>
        <li>
          <h5 class="summary-topic">Memory</h5>
          <p class="summary-rate">92 / 100</p>
        </li>
        <li>
          <h5 class="summary-topic">Verbal</h5>
          <p class="summary-rate">61 / 100</p>
        </li>
        <li>
          <h5 class="summary-topic">Visual</h5>
          <p class="summary-rate">72 / 100</p>
        </li>
      </ul>

      <button class="button-continue">Continue</button>
    </div>
  </div>

  <footer class="site-footer">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Rafael Cardoso dos Santos</a>.
  </footer>
</body>

</html>
