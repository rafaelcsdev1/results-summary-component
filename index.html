<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Results summary component</title>

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/globals.css">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/responsive.css">

</head>

<body>
  <div class="flex-container">
    <div class="result-box">
      <h4 class="result-title">Your Result</h4>
      <div class="circle">
        <h1>76</h1>
        <p>of 100</p>
      </div>
      <h3>Great</h3>
      <p class="result-text">You scored higher than 65% of the people who have taken these tests.</p>
    </div>

    <div class="summary-box">

      <h4 class="summary-title">Summary</h4>

      <ul>
        <li class="reaction">
          <div class="topic-group">
            <img src="./assets/images/icon-reaction.svg" alt="Reaction icon">
            <h5>Reaction</h5>
          </div>
          <div class="score-group">
            <span class="score">80 </span><span class="total">/ 100</span>
          </div>
        </li>
        <li class="memory">
          <div class="topic-group">
            <img src="./assets/images/icon-memory.svg" alt="Memory icon">
            <h5>Memory</h5>
          </div>
          <div class="score-group">
            <span class="score">92 </span><span class="total">/ 100</span>
          </div>
        </li>
        <li class="verbal">
          <div class="topic-group">
            <img src="./assets/images/icon-verbal.svg" alt="Verbal icon">
            <h5>Verbal</h5>
          </div>
          <div class="score-group">
            <span class="score">61 </span><span class="total">/ 100</span>
          </div>
        </li>
        <li class="visual">
          <div class="topic-group">
            <img src="./assets/images/icon-visual.svg" alt="Visual icon">
            <h5>Visual</h5>
          </div>
          <div class="score-group">
            <span class="score">72 </span><span class="total">/ 100</span>
          </div>
        </li>
      </ul>

      <button class="button-continue">Continue</button>
    </div>
  </div>

  <footer class="site-footer">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Rafael Cardoso dos Santos</a>.
  </footer>
</body>

</html>
